# ──────────────────────────────────────────────
# Chat-Ki-S Agent 정책 설정
# AI Agent가 어떤 행동을 허용/금지하는지 정의
# ──────────────────────────────────────────────

# 허용된 Agent 액션 목록
allowed_actions:
  - leave           # 연차/휴가 신청
  - expense          # 경비 정산
  - notices          # 공지 조회
  - mail             # 메일 조회
  - assignment       # 과제 등록 (mentor만)
  - assignment_submit # 과제 제출 (mentee만)
  - assignments_list # 과제 목록 조회

# 사람 확인이 필요한 액션 (Human-in-the-loop)
require_confirmation:
  - leave            # 연차 신청 전 확인
  - expense          # 경비 정산 전 확인
  - assignment       # 과제 등록 전 확인
  - assignment_submit # 과제 제출 전 확인

# 확인 없이 바로 실행하는 액션
auto_execute:
  - notices          # 공지 조회 (읽기만)
  - mail             # 메일 조회 (읽기만)
  - assignments_list # 과제 목록 조회 (읽기만)

# 역할별 허용 액션
role_permissions:
  mentee:
    allowed:
      - leave
      - expense
      - notices
      - mail
      - assignment_submit
      - assignments_list
    denied:
      - assignment     # 과제 등록은 mentor만

  mentor:
    allowed:
      - leave
      - expense
      - notices
      - mail
      - assignment
      - assignments_list
    denied:
      - assignment_submit  # 과제 제출은 mentee만

# 금지 키워드 (이 키워드가 포함된 질문은 즉시 거절)
blocked_keywords:
  - 주가 전망
  - 투자 추천
  - 종목 추천
  - 매수 추천
  - 매도 추천
  - 수익률 예측

# 금지 키워드 감지 시 응답 메시지
blocked_response: |
  죄송합니다. 투자 관련 조언이나 종목 추천은 챗봇에서 답변할 수 없는 주제입니다.
  투자 관련 문의는 영업부서 또는 리서치센터에 문의해 주세요.

# LLM 가드레일
llm_guardrails:
  # 답변에 포함되면 안 되는 패턴
  prohibited_patterns:
    - "~할 것 같습니다"     # 추측 표현
    - "아마도"
    - "제 생각에는"
    - "확실하지 않지만"

  # 답변 제한
  max_tokens: 512
  temperature: 0.2
  top_p: 0.9

  # 반드시 문서 기반으로만 답변
  require_source: true

  # fallback 조건
  fallback_threshold: 0.50  # 유사도 이 미만이면 답변 거부

# 토큰 비용 관리
cost_limits:
  # 일일 토큰 상한
  daily_token_limit: 100000

  # 단일 요청 토큰 상한
  per_request_limit: 5000

  # 경고 임계값 (일일 한도의 80%)
  warning_threshold: 0.8

# 로깅 설정
logging:
  # 모든 Agent 액션 로깅
  log_actions: true

  # RAG 호출 로깅 (토큰 포함)
  log_rag: true

  # 로그 보존 기간
  retention_days: 90
